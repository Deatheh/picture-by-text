syntax = "proto3";

package userpb;

option go_package = "./userpb;userpb";

service UserService {
    rpc Register(RegisterRequest) returns (RegisterResponse);
}


message RegisterRequest {
    string email = 1;       
    string password = 2;     
}

message RegisterResponse {
    bool success = 1;
    string message = 2;
    string uuid = 3;   
}

message Empty {}

message HealthCheckResponse {
    bool healthy = 1;
    string service = 2;
}