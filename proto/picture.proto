syntax = "proto3";

package picturepb;

option go_package = "./picturepb;picturepb";

service PictureService {
    rpc GenerateIllustrations(GenerateRequest) returns (GenerateResponse);
    rpc GetTaskStatus(StatusRequest) returns (StatusResponse);
    rpc RegenerateImage(RegenerateRequest) returns (RegenerateResponse);
}

message GenerateRequest {
    string text = 1;
    int32 max_images = 2;
}

message GenerateResponse {
    bool success = 1;
    string task_id = 2;
    string message = 3;
}

message StatusRequest {
    string task_id = 1;
}

message StatusResponse {
    bool success = 1;
    string task_id = 2;
    string status = 3;      // pending, processing, completed, failed
    int32 progress = 4;     // процент выполнения
    repeated ImageResult images = 5;
    string message = 6;
}

message ImageResult {
    int32 scene_index = 1;
    string text = 2;
    string image_url = 3;
}

message RegenerateRequest {
    string task_id = 1;
    int32 scene_index = 2;
    string custom_prompt = 3;  // опционально
}

message RegenerateResponse {
    bool success = 1;
    string image_url = 2;
    string message = 3;
}