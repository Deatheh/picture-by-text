version: '3.8'

services:
  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    ports:
      - "${USER_SERVICE_PORT:-50051}:50051"
    environment:
      USER_SERVICE_HOST: ${USER_SERVICE_HOST:-0.0.0.0}
      USER_SERVICE_PORT: ${USER_SERVICE_PORT:-50051}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_DB: ${POSTGRES_DB:-microservices}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      JWT_SECRET: ${JWT_SECRET:-secret-jwt-key}
    networks:
      - microservices
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    environment:
      API_GATEWAY_HOST: ${API_GATEWAY_HOST:-0.0.0.0}
      API_GATEWAY_PORT: ${API_GATEWAY_PORT:-8080}
      USER_SERVICE_URL: ${USER_SERVICE_URL:-user-service:50051}
      JWT_SECRET: ${JWT_SECRET:-secret-jwt-key}
    depends_on:
      - user-service
    networks:
      - microservices
    restart: unless-stopped

networks:
  microservices:
    driver: bridge