name: pic-by-text

services:
  # ========== PostgreSQL ==========
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_DB: ${POSTGRES_DB:-microservices}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-microservices}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - microservices

  # ========== Миграции для user-service ==========
  migrate-user:
    image: migrate/migrate:v4.18.1
    container_name: migrate-user
    volumes:
      - ./user-service/internal/repository/db/migrations:/migrations
    command:
      - "-path"
      - "/migrations"
      - "-database"
      - "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres123}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-microservices}?sslmode=disable"
      - "up"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - microservices

  # ========== Миграции для picture-service ==========
  migrate-picture:
    image: migrate/migrate:v4.18.1
    container_name: migrate-picture
    volumes:
      - ./picture-service/internal/repository/db/migrations:/migrations
    command:
      - "-path"
      - "/migrations"
      - "-database"
      - "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres123}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-microservices}?sslmode=disable&x-migrations-table=picture_schema_migrations"
      - "up"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - microservices

  # ========== Redis (для сессий и кэша) ==========
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - microservices

  # ========== User Service ==========
  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    ports:
      - "${USER_SERVICE_PORT:-50051}:50051"
    environment:
      USER_SERVICE_HOST: ${USER_SERVICE_HOST:-0.0.0.0}
      USER_SERVICE_PORT: ${USER_SERVICE_PORT:-50051}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_DB: ${POSTGRES_DB:-microservices}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      JWT_SECRET: ${JWT_SECRET:-secret-jwt-key}
    depends_on:
      migrate-user:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - microservices
    restart: unless-stopped

  # ========== API Gateway ==========
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    environment:
      API_GATEWAY_HOST: ${API_GATEWAY_HOST:-0.0.0.0}
      API_GATEWAY_PORT: ${API_GATEWAY_PORT:-8080}
      USER_SERVICE_URL: ${USER_SERVICE_URL:-user-service:50051}
      PICTURE_SERVICE_URL: ${PICTURE_SERVICE_URL:-picture-service:50052}
      JWT_SECRET: ${JWT_SECRET:-secret-jwt-key}
    depends_on:
      user-service:
        condition: service_started
      picture-service:
        condition: service_started
    networks:
      - microservices
    restart: unless-stopped

  # ========== Picture Service ==========
  picture-service:
    build:
      context: .
      dockerfile: picture-service/Dockerfile
    container_name: picture-service
    ports:
      - "${PICTURE_SERVICE_PORT:-50052}:50052"
    environment:
      PICTURE_SERVICE_HOST: ${PICTURE_SERVICE_HOST:-0.0.0.0}
      PICTURE_SERVICE_PORT: ${PICTURE_SERVICE_PORT:-50052}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_DB: ${POSTGRES_DB:-microservices}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      STORAGE_PATH: ${STORAGE_PATH:-/app/storage}
      JWT_SECRET: ${JWT_SECRET:-secret-jwt-key}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate-picture:
        condition: service_completed_successfully
    volumes:
      - picture_storage:/app/storage
    networks:
      - microservices
    restart: unless-stopped

networks:
  microservices:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  picture_storage: